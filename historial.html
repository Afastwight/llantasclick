  <main class="account-page">
    <section class="account-card">
      <span class="account-badge">Zona de usuario</span>

      <h1>Historial de pedidos</h1>

      <p class="account-description">
        Aquí podrás consultar los pedidos realizados desde tu cuenta, revisar el estado
        de tus compras y verificar información general de cada orden.
      </p>

      <div class="orders-summary">
        <div>
          <span>Pedidos</span>
          <strong id="ordersCount">0</strong>
        </div>

        <div>
          <span>Estado</span>
          <strong>Cuenta activa</strong>
        </div>
      </div>

      <div id="ordersList" class="orders-list">
        <p class="loading-text">Cargando pedidos...</p>
      </div>

      <div class="account-actions">
        <a href="/perfil.html" class="btn-primary">Volver al perfil</a>
        <a href="/" class="btn-outline">Ir al inicio</a>
      </div>
    </section>
